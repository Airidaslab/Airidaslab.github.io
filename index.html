<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formos Užsakymas</title>
</head>
<body>

  <!-- Language Selector -->
  <label for="languageSelect">Pasirinkite kalbą:</label>
  <select id="languageSelect" onchange="switchLanguage()">
    <option value="lt">Lietuvių</option>
    <option value="en">English</option>
    <option value="ru">Русский</option>
  </select>

  <br><br>

  <!-- Form Title -->
  <h2 id="formPrompt">Pateikti Užsakymą:</h2>

  <!-- Shape Selection -->
  <label for="shapeSelect">Pasirinkite formą:</label>
  <select id="shapeSelect" onchange="calculateTotal()">
    <option value="circle">Apskritimas (0.05 €)</option>
    <option value="triangle">Trikampis (0.15 €)</option>
    <option value="standard">Standartas (0.10 €)</option>
    <option value="rectangle">Stačiakampis (0.20 €)</option>
  </select>

  <br><br>

  <!-- Color Selection (all colors 0.05 € for now) -->
  <label for="colorSelect">Pasirinkite spalvą:</label>
  <select id="colorSelect" onchange="calculateTotal()">
    <option value="color1">Spalva 1 (0.05 €)</option>
    <option value="color2">Spalva 2 (0.05 €)</option>
    <option value="color3">Spalva 3 (0.05 €)</option>
  </select>

  <br><br>

  <!-- Grams (fixed cost of 3 euros) -->
  <label for="grams">Svoris:</label>
  <span id="gramsCost">3.00 €</span>

  <br><br>

  <!-- Display Total Price -->
  <h3 id="totalPrice">Bendra suma: 0.00 €</h3>

  <!-- Submit Button (No Redirection) -->
  <button type="button" id="submitOrderButton" onclick="showPrice()">Pateikti Užsakymą</button>

  <script>
    // Translations for each language
    const translations = {
      lt: {
        formPrompt: "Pateikti Užsakymą:",
        submitButton: "Pateikti Užsakymą",
        priceMessage: "Galutinė kaina:"
      },
      en: {
        formPrompt: "Submit Order:",
        submitButton: "Submit Order",
        priceMessage: "Final Price:"
      },
      ru: {
        formPrompt: "Отправить заказ:",
        submitButton: "Отправить заказ",
        priceMessage: "Итоговая цена:"
      }
    };

    // Prices for each option
    const prices = {
      shapes: {
        circle: 0.05,
        triangle: 0.15,
        standard: 0.10,
        rectangle: 0.20
      },
      color: 0.05,   // Fixed price for color
      grams: 3.00    // Fixed grams cost
    };

    // Function to switch languages
    function switchLanguage() {
      const selectedLanguage = document.getElementById("languageSelect").value;
      
      // Update the text on the page
      document.getElementById("formPrompt").innerText = translations[selectedLanguage].formPrompt;
      document.getElementById("submitOrderButton").innerText = translations[selectedLanguage].submitButton;
    }

    // Calculate total price based on selections
    function calculateTotal() {
      const selectedShape = document.getElementById("shapeSelect").value;

      // Calculate total based on selected options
      const shapePrice = prices.shapes[selectedShape] || 0;
      const colorPrice = prices.color;  // Fixed price for color
      const gramsPrice = prices.grams;  // Fixed price for grams

      const total = shapePrice + colorPrice + gramsPrice;
      
      // Display the total price
      document.getElementById("totalPrice").innerText = `Bendra suma: ${total.toFixed(2)} €`;
    }

    // Show price in an alert when submitting
    function showPrice() {
      const totalText = document.getElementById("totalPrice").innerText;
      alert(`${totalText}\nAtminkite šią kainą užsakant.`);
    }

    // Initialize the language on page load
    window.onload = function() {
      switchLanguage(); // Ensure default language is applied on page load
      calculateTotal(); // Calculate total with default values
    };
  </script>

</body>
</html>
