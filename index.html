<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Customizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Customize Your Product</h1>
  <form id="customizationForm" action="" method="post">
    <!-- Shape Selection -->
    <label for="shape">Choose a Shape:</label>
    <select id="shape" name="shape">
      <option value="circle">Circle</option>
      <option value="square">Square</option>
      <option value="triangle">Triangle</option>
    </select>

    <!-- Grams Selection -->
    <label for="grams">Select Grams:</label>
    <select id="grams" name="grams">
      <option value="50g">50g</option>
      <option value="100g">100g</option>
      <option value="200g">200g</option>
    </select>

    <!-- Color Selection -->
    <label for="color">Choose a Color:</label>
    <input type="color" id="color" name="color" value="#ff0000">

    <!-- Submit Button -->
    <button type="submit">Submit Order</button>
  </form>

  <p id="orderConfirmation" style="display:none;">Thank you! Your order has been submitted.</p>

  <script src="script.js"></script>
</body>
</html>
