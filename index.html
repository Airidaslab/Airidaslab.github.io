<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formos Užsakymas</title>
</head>
<body>
  <!-- Language Selector -->
  <label for="languageSelect">Pasirinkite kalbą:</label>
  <select id="languageSelect" onchange="switchLanguage()">
    <option value="lt">Lietuvių</option>
    <option value="en">English</option>
    <option value="ru">Русский</option>
  </select>

  <!-- Link to Google Form -->
  <h2 id="formPrompt">Pateikti Užsakymą:</h2>
  <a id="submitButton" href="https://docs.google.com/forms/d/e/1FAIpQLSeQ2G2snJXhXM479lPHztG8BSpLH7aRW34J6cabiT_qarDCQw/viewform?usp=sf_link" target="_blank">
    <button type="button">Pateikti Užsakymą</button>
  </a>

  <script>
    // Translations for each language
    const translations = {
      lt: {
        formPrompt: "Pateikti Užsakymą:",
        submitButton: "Pateikti Užsakymą"
      },
      en: {
        formPrompt: "Submit Order:",
        submitButton: "Submit Order"
      },
      ru: {
        formPrompt: "Отправить заказ:",
        submitButton: "Отправить заказ"
      }
    };

    // Function to switch languages
    function switchLanguage() {
      const selectedLanguage = document.getElementById("languageSelect").value;
      document.getElementById("formPrompt").innerText = translations[selectedLanguage].formPrompt;
      document.getElementById("submitButton").innerText = translations[selectedLanguage].submitButton;
    }

    // Initialize the language on page load
    window.onload = function() {
      switchLanguage();
    };
  </script>
</body>
</html>
